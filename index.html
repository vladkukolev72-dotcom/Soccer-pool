// ИСПРАВЛЕНИЕ: Функция вибрации
function triggerVibrate(ms) {
    if (typeof vibrationEnabled !== 'undefined' && vibrationEnabled && navigator && navigator.vibrate) {
        try { navigator.vibrate(ms); } catch(e) {}
    }
}

function playMenuSound() {
    if (gameSounds['click']) {
        gameSounds['click'].volume = 0.2; // ИСПРАВЛЕНИЕ: Тихий звук клика
        gameSounds['click'].currentTime = 0; // ИСПРАВЛЕНИЕ: Мгновенный сброс
        let playPromise = gameSounds['click'].play();
        if (playPromise !== undefined) {
            playPromise.catch(e => console.log("Menu sound error"));
        }
    }
}

function initAudio() {
    if (audioInitialized) return; 
    
    try {
        const soundFiles = {
            'ball_hit':    'ball_hit.mp3',
            'ball_wall':   'ball_wall.mp3',
            'chip_wall':   'chip_wall.mp3',
            'chips_hit':   'chips_hit.mp3',
            'crowd_shout': 'crowd_shout.mp3',
            'goal':        'goal.mp3',
            'click':       'click.mp3' // ИСПРАВЛЕНИЕ: Заменен тяжелый удар на звук клика
        };

        for (let key in soundFiles) {
            gameSounds[key] = new Audio(soundFiles[key]);
            gameSounds[key].preload = 'auto';
        }

        if (gameSounds['crowd_shout']) {
            gameSounds['crowd_shout'].loop = true;
        }
        
        audioInitialized = true;
        console.log("Звуковой движок успешно запущен в корневой папке!");
    } catch (e) {
        console.error("Ошибка инициализации звука:", e);
    }
}

function playSound(type, volume = 1.0) {
    try {
        if (typeof soundEnabled !== 'undefined' && !soundEnabled) return;
        
        initAudio(); 

        let soundKey = type;

        if (type === 'hit') {
            soundKey = 'ball_hit';
        } else if (type === 'wall') {
            soundKey = 'ball_wall';
        } else if (type === 'chips_hit' || type === 'chip_hit') {
            soundKey = 'chips_hit';
        } else if (type === 'chip_wall') {
            soundKey = 'chip_wall';
        }

        if (gameSounds && gameSounds[soundKey]) {
            let audio = gameSounds[soundKey];
            
            if (audio && typeof audio.play === 'function') {
                let safeVolume = volume;
                if (safeVolume > 1.0) safeVolume = 1.0;
                if (safeVolume < 0.0) safeVolume = 0.0;
                
                audio.volume = safeVolume;
                audio.currentTime = 0; // ИСПРАВЛЕНИЕ: Мгновенный старт звука без микрозадержек
                
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function(error) {
                        console.log("Audio waiting for user interaction");
                    });
                }
            }
        }
    } catch (globalSoundError) {
        console.error("Ошибка в playSound:", globalSoundError);
    }
}

function touchStarted() {
    initAudio();
    if (window.getAudioContext && window.getAudioContext().state === 'suspended') {
        window.getAudioContext().resume();

}

function mousePressed() {
    initAudio();
    if (window.getAudioContext && window.getAudioContext().state === 'suspended') {

}

function drawStar(x, y, radius1, radius2, npoints) {
    let angle = TWO_PI / npoints;
    let halfAngle = angle / 2.0;
    beginShape();
    for (let a = -HALF_PI; a < TWO_PI - HALF_PI; a += angle) {
        let sx = x + cos(a) * radius2;
        let sy = y + sin(a) * radius2;
        vertex(sx, sy);
        sx = x + cos(a + halfAngle) * radius1;
        sy = y + sin(a + halfAngle) * radius1;
        vertex(sx, sy);
    }
    endShape(CLOSE);
}

function updateLevelModifiers() {
    activeModifiers = [];
    goalW = defaultGoalW; 
    if (!isCampaign || !fieldW) return;

    let lvl = CAMPAIGN_LEVELS[currentLevel];
    if (!lvl) return;

    for (let i = 0; i < (lvl.sandCount || 0); i++) {
        let randX = fieldX + random(60, fieldW - 140);
        let randY = fieldY + random(60, fieldH - 140);
        activeModifiers.push({
            x: randX, y: randY, w: random(70, 100), h: random(70, 100),
            type: 'mud', color: 'rgba(139, 69, 19, 0.32)', label: '░',
            forceX: 0, forceY: 0
        });
    }

    for (let i = 0; i < (lvl.iceCount || 0); i++) {
        let randX = fieldX + random(60, fieldW - 140);
        let randY = fieldY + random(60, fieldH - 140);
        activeModifiers.push({
            x: randX, y: randY, w: random(80, 110), h: random(80, 110),
            type: 'ice', color: 'rgba(0, 255, 255, 0.25)', label: '❄',
            forceX: 0, forceY: 0
        });
    }

    let isRedWind = (lvl.mod === 'fast_ball' || lvl.mod === 'chaos');
    let windColor = isRedWind ? 'rgba(255, 50, 50, 0.35)' : 'rgba(0, 191, 255, 0.32)';
    
    for (let i = 0; i < (lvl.windCount || 0); i++) {
        let randX = fieldX + random(60, fieldW - 140);
        let randY = fieldY + random(60, fieldH - 140);
        let angle = random(TWO_PI);
        let fx = cos(angle) * (isRedWind ? 0.28 : 0.16); 
        let fy = sin(angle) * (isRedWind ? 0.28 : 0.16);
        let lbl = '→';
        if (abs(fx) > abs(fy)) { lbl = fx > 0 ? '→' : '←'; } else { lbl = fy > 0 ? '↓' : '↑'; }

        activeModifiers.push({
            x: randX, y: randY, w: random(80, 110), h: random(80, 110),
            type: 'wind', color: windColor, label: lbl,
            forceX: fx, forceY: fy
        });
    }
}

function drawModifiers() {
    if (!isCampaign || activeModifiers.length === 0 || isEditingTactic) return;
    push();
    activeModifiers.forEach(zone => {
        noStroke();
        fill(zone.color);
        rect(zone.x, zone.y, zone.w, zone.h, 10);
        if (zone.color.includes('255, 50')) fill(255, 0, 0, 180); else fill(255, 130);
        textSize(24); textAlign(CENTER, CENTER);
        text(zone.label, zone.x + zone.w / 2, zone.y + zone.h / 2);
    });
    pop();
}

class Entity {
    constructor(x, y, d, color, isBall) {
        this.p = createVector(x, y); 
        this.v = createVector(0, 0); 
        this.d = d;                   
        this.color = color;
        this.isBall = isBall;
        this.mass = isBall ? 1.0 : 6.0; 
    }

    update() {
        if (isResettingPositions || isEvacuating || matchWinner || isGoalCelebrating) return;

        this.p.add(this.v);
        let currentFriction = FRICTION;
        let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;

        if (this.isBall && lvl && lvl.mod === 'chaos') { currentFriction = 0.996; }

        if (isCampaign) {
            activeModifiers.forEach(zone => {
                if (this.p.x > zone.x && this.p.x < zone.x + zone.w &&
                    this.p.y > zone.y && this.p.y < zone.y + zone.h) {
                    if (zone.type === 'mud') currentFriction = FRICTION * 0.90; 
                    if (zone.type === 'ice') currentFriction = 0.998; 
                    if (zone.type === 'wind') { this.v.x += zone.forceX; this.v.y += zone.forceY; }
                }
            });
        }

        this.v.mult(currentFriction); 
        if (this.v.mag() < 0.08) this.v.set(0, 0);

        if (this.isBall) {
            if (this.v.mag() > 0.5) { ballTrail.push({ x: this.p.x, y: this.p.y, alpha: 180 }); }
            if (ballTrail.length > 15) ballTrail.shift();
        }

        let r = this.d / 2;
        let goalX = fieldX + fieldW/2;
        
        let currentTopGoalW = goalW;
        let currentBotGoalW = goalW;
        if (lvl && (lvl.mod === 'gate_shift' || lvl.mod === 'chaos')) {
            currentTopGoalW = goalW * lvl.bScale;
            currentBotGoalW = goalW * lvl.pScale;
        }

        let leftPostXTop = goalX - currentTopGoalW/2;
        let rightPostXTop = goalX + currentTopGoalW/2;
        let leftPostXBot = goalX - currentBotGoalW/2;
        let rightPostXBot = goalX + currentBotGoalW/2;

        if (this.p.y < fieldY) {
            if (this.p.x > leftPostXTop && this.p.x < rightPostXTop) {
                if (this.p.y < fieldY - goalH + r) { this.p.y = fieldY - goalH + r; this.v.y *= -0.8; }
            }
        }
        if (this.p.y > fieldY + fieldH) {
            if (this.p.x > leftPostXBot && this.p.x < rightPostXBot) {
                if (this.p.y > fieldY + fieldH + goalH - r) { this.p.y = fieldY + fieldH + goalH - r; this.v.y *= -0.8; }
            }
        }

        if (this.p.y < fieldY && this.p.y > fieldY - goalH) {
            if (this.p.x < leftPostXTop + r && this.p.x > leftPostXTop - 5) { this.p.x = leftPostXTop - r; this.v.x *= -0.8; }
            if (this.p.x > rightPostXTop - r && this.p.x < rightPostXTop + 5) { this.p.x = rightPostXTop + r; this.v.x *= -0.8; }
        }
        if (this.p.y > fieldY + fieldH && this.p.y < fieldY + fieldH + goalH) {
            if (this.p.x < leftPostXBot + r && this.p.x > leftPostXBot - 5) { this.p.x = leftPostXBot - r; this.v.x *= -0.8; }
            if (this.p.x > rightPostXBot - r && this.p.x < rightPostXBot + 5) { this.p.x = rightPostXBot + r; this.v.x *= -0.8; }
        }

        if (this.p.y < fieldY + 15 && this.p.y > fieldY - 15) {
            let dLeft = dist(this.p.x, this.p.y, leftPostXTop, fieldY);
            if (dLeft < r + 4) {
                let norm = createVector(this.p.x - leftPostXTop, this.p.y - fieldY).normalize();
                this.p.set(leftPostXTop + norm.x * (r + 4.5), fieldY + norm.y * (r + 4.5));
                this.v.reflect(norm).mult(0.8);
                playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
            }
            let dRight = dist(this.p.x, this.p.y, rightPostXTop, fieldY);
            if (dRight < r + 4) {
                let norm = createVector(this.p.x - rightPostXTop, this.p.y - fieldY).normalize();
                this.p.set(rightPostXTop + norm.x * (r + 4.5), fieldY + norm.y * (r + 4.5));
                this.v.reflect(norm).mult(0.8);
                playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
            }
        }
        if (this.p.y > fieldY + fieldH - 15 && this.p.y < fieldY + fieldH + 15) {
            let dLeft = dist(this.p.x, this.p.y, leftPostXBot, fieldY + fieldH);
            if (dLeft < r + 4) {
                let norm = createVector(this.p.x - leftPostXBot, this.p.y - (fieldY + fieldH)).normalize();
                this.p.set(leftPostXBot + norm.x * (r + 4.5), (fieldY + fieldH) + norm.y * (r + 4.5));
                this.v.reflect(norm).mult(0.8);
                playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
            }
            let dRight = dist(this.p.x, this.p.y, rightPostXBot, fieldY + fieldH);
            if (dRight < r + 4) {
                let norm = createVector(this.p.x - rightPostXBot, this.p.y - (fieldY + fieldH)).normalize();
                this.p.set(rightPostXBot + norm.x * (r + 4.5), (fieldY + fieldH) + norm.y * (r + 4.5));
                this.v.reflect(norm).mult(0.8);
                playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
            }
        }

        if (this.p.x < fieldX + r) { this.p.x = fieldX + r; this.v.x *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.x)*2); }
        if (this.p.x > fieldX + fieldW - r) { this.p.x = fieldX + fieldW - r; this.v.x *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.x)*2); }
        if (this.p.y < fieldY + r) {
            if (!(this.p.x > leftPostXTop && this.p.x < rightPostXTop)) { this.p.y = fieldY + r; this.v.y *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.y)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.y)*2); }
        }
        if (this.p.y > fieldY + fieldH - r) {
            if (!(this.p.x > leftPostXBot && this.p.x < rightPostXBot)) { this.p.y = fieldY + fieldH - r; this.v.y *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.y)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.y)*2); }
        }
    }

    display(isAnyEntityMoving) {
        push();
        let currentEntityAlpha = this.isBall ? 255 : (isEditingTactic ? 255 : globalSpawnAlpha);
        let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;

        if (this.isBall) {
            fill(0, map(currentEntityAlpha, 0, 255, 0, 75)); noStroke();
            ellipse(this.p.x + 3, this.p.y + 4, this.d); 

            if (this.v.mag() === 0 && !isResettingPositions && !isEvacuating && !matchWinner && !isEditingTactic && !isGoalCelebrating) ballAuraAlpha = lerp(ballAuraAlpha, 110, 0.05);
            else ballAuraAlpha = 0; 
            if (ballAuraAlpha > 0) {
                if (lvl && (lvl.mod === 'fast_ball' || lvl.mod === 'chaos')) fill(255, 50, 50, ballAuraAlpha);
                else fill(255, 255, 190, ballAuraAlpha); 
                ellipse(this.p.x, this.p.y, this.d * 2.2);
            }
            
            push(); 
            translate(this.p.x, this.p.y); 
            if (lvl && (lvl.mod === 'fast_ball' || lvl.mod === 'chaos')) { fill('#ff3333'); stroke('#ffcc00'); } 
            else { fill(255); stroke(40); }
            strokeWeight(3); ellipse(0, 0, this.d); 
            
            let dotSize = (this.d / 2) * 0.9; 
            let offset = (this.d / 2) - dotSize / 2 - 0.5; 
            if (lvl && (lvl.mod === 'fast_ball' || lvl.mod === 'chaos')) fill('#550000'); else fill(40); 
            noStroke(); ellipse(-offset, 0, dotSize); ellipse(offset, 0, dotSize);  
            pop();
        } else {
            fill(0, map(currentEntityAlpha, 0, 255, 0, 80)); noStroke();
            ellipse(this.p.x + 4, this.p.y + 5, this.d);

            if (this.color === currentTurn && orbitAlpha > 0.5 && !isEditingTactic && !isResettingPositions && !isEvacuating && !matchWinner && !isGoalCelebrating) {
                stroke(0, map(orbitAlpha, 0, 255, 0, currentEntityAlpha));
                strokeWeight(3.5); noFill();
                let numSegments = 6; let segmentLength = (TWO_PI / numSegments) * 0.45; 
                push(); translate(this.p.x, this.p.y); rotate(orbitAngle * 0.5); 
                for (let i = 0; i < numSegments; i++) {
                    let startAngle = i * (TWO_PI / numSegments);
                    arc(0, 0, this.d * 1.45, this.d * 1.45, startAngle, startAngle + segmentLength);
                }
                pop();
            }

            stroke(0, currentEntityAlpha); strokeWeight(4.25);
            fill(this.color);
            
            ellipse(this.p.x, this.p.y, this.d);
            fill(255, currentEntityAlpha); noStroke();
            drawStar(this.p.x, this.p.y, this.d * 0.15, this.d * 0.32, 5);
        }
        pop();
    }

    checkGoal() {
        if (!this.isBall || isResettingPositions || isEvacuating || isEditingTactic || matchWinner || isGoalCelebrating) return false;

        if (this.p.y < fieldY - 3) { 
            let scoringTeam = PLAYER1_COLOR; let nextTurnTeam = PLAYER2_COLOR; 
            if (lastTouchColor === PLAYER2_COLOR) { goalOverlayText = 'АВТОГОЛ!'; scoringTeam = PLAYER1_COLOR; nextTurnTeam = PLAYER2_COLOR; p1Goals++; } 
            else { goalOverlayText = 'ГОЛ!'; p1Goals++; }
            
            triggerVibrate(60); 
            createGoalBurstParticles(this.p.x, fieldY, scoringTeam, true);
            
            if (p1Goals >= maxGoalsToWin) { triggerWin(isTournament ? tourRounds[currentRoundIdx][currentMatchIdx].t1.name : 'КРАСНЫЕ'); return true; }
            
            playSound('goal', 0.4); // ИСПРАВЛЕНИЕ: Звук гола стал комфортнее
            startGoalCelebrationPhase(scoringTeam, nextTurnTeam);
            return true; 
        } 

        if (this.p.y > fieldY + fieldH + 3) { 
            let scoringTeam = PLAYER2_COLOR; let nextTurnTeam = PLAYER1_COLOR; 
            if (lastTouchColor === PLAYER1_COLOR) { goalOverlayText = 'АВТОГОЛ!'; scoringTeam = PLAYER2_COLOR; nextTurnTeam = PLAYER1_COLOR; p2Goals++; } 
            else { goalOverlayText = 'ГОЛ!'; p2Goals++; }
            
            triggerVibrate(60); 
            createGoalBurstParticles(this.p.x, fieldY + fieldH, scoringTeam, false);
            
            if (p2Goals >= maxGoalsToWin) { triggerWin(isTournament ? tourRounds[currentRoundIdx][currentMatchIdx].t2.name : 'СИНИЕ'); return true; }
            
            playSound('goal', 0.4); // ИСПРАВЛЕНИЕ: Звук гола стал комфортнее
            startGoalCelebrationPhase(scoringTeam, nextTurnTeam);
            return true; 
        } 
        return false;
    }
}

class Particle {
    constructor(x, y, color, speedMult = 1) {
        this.p = createVector(x, y); 
        this.v = p5.Vector.random2D().mult(random(2, 5) * speedMult);
        this.alpha = 255; this.color = color; this.size = random(3, 5);
    }
    update() { this.p.add(this.v); this.v.mult(0.95); this.alpha -= 6; }
    display() {
        push(); noStroke(); let c = color(this.color); c.setAlpha(this.alpha);
        fill(c); ellipse(this.p.x, this.p.y, this.size); pop();
    }
}

class GoalBurstParticle {
    constructor(x, y, color, isTopGoal) {
        this.p = createVector(x, y);
        let angle = isTopGoal ? random(0.2, PI - 0.2) : random(-PI + 0.2, -0.2);
        this.v = createVector(cos(angle), sin(angle)).mult(random(3, 7));
        this.alpha = 255;
        this.color = color;
        this.size = random(4, 6);
    }
    update() { this.p.add(this.v); this.v.mult(0.96); this.alpha -= 5; }
    display() {
        push(); noStroke(); let c = color(this.color); c.setAlpha(this.alpha);
        fill(c); ellipse(this.p.x, this.p.y, this.size); pop();
    }
}

function createSparks(x, y, color, intensity) {
    if (particles.length > 120 || matchWinner) return; 
    let count = constrain(map(intensity, 0, 10, 2, 6), 2, 8);
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}

function createGoalBurstParticles(x, y, teamColor, isTopGoal) {
    for (let i = 0; i < 15; i++) { 
        particles.push(new GoalBurstParticle(x, y, teamColor, isTopGoal));
    }
}

function startGoalCelebrationPhase(scoringTeam, nextTurnTeam) {
    isGoalCelebrating = true;
    goalCelebrationTimer = 120; 
    pendingNextTurnTeam = nextTurnTeam;
    goalScoringTeamColor = scoringTeam;
    
    shakeAmount = 12; 
    goalTextTimer = 120; 
    targetFieldScale = 0.88; 
}

function triggerWin(winnerName) {
    matchWinner = winnerName; 
    shakeAmount = 0; 
    goalTextTimer = 180; 
    targetFieldScale = 1.0; 
    
    let loseColor = (p1Goals > p2Goals) ? PLAYER2_COLOR : PLAYER1_COLOR;
    for (let e of entities) {
        e.v.set(0, 0);
        if (!e.isBall && e.color === loseColor) e.color = '#555555'; 
    }
    playSound('win_fanfare');
    triggerVibrate(80);
}

function drawBallTrail() {
    if (matchWinner || isEditingTactic) return; 
    push();
    let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;
    let isRedTrail = lvl && (lvl.mod === 'fast_ball' || lvl.mod === 'chaos');

    for (let i = 0; i < ballTrail.length; i++) {
        let pt = ballTrail[i];
        let size = map(i, 0, ballTrail.length - 1, 4, 14);
        let alpha = map(i, 0, ballTrail.length - 1, 10, pt.alpha);
        noStroke(); 
        if (isRedTrail) fill(255, 30, 30, alpha * 0.7); else fill(255, alpha * 0.45); 
        ellipse(pt.x, pt.y, size);
        pt.alpha -= 1.8;
    }
    for (let i = ballTrail.length - 1; i >= 0; i--) { if (ballTrail[i].alpha <= 0) ballTrail.splice(i, 1); }
    pop();
}

function initTournament(teamCount) {
    isTournament = true;

    currentRoundIdx = 0;
    currentMatchIdx = 0;
    tourRounds = [];

    let shuffled = shuffle([...TOURNAMENT_PRESET_TEAMS]);
    tourTeams = shuffled.slice(0, teamCount);

    let firstRoundMatches = [];
    for (let i = 0; i < teamCount; i += 2) {
        firstRoundMatches.push({
            t1: tourTeams[i],
            t2: tourTeams[i+1],
            score1: 0,
            score2: 0,
            played: false
        });
    }
    tourRounds.push(firstRoundMatches);
    gameState = 'TOUR_BRACKET';
}

function handleGameLogic() {
    orbitAngle += 0.04; 

    if (globalSpawnAlpha < 255) {
        globalSpawnAlpha += 5.5; if (globalSpawnAlpha > 255) globalSpawnAlpha = 255;
    }

    if (isGoalCelebrating) {

            animateFieldToTactic(pendingNextTurnTeam); 
        }
    }

    if (isResettingPositions || isEvacuating) {
        let arrivedCount = 0;
        for (let i = 0; i < entities.length; i++) {
            let targetPos = targetPositions[i];
            if (targetPos) {
                entities[i].p.x = lerp(entities[i].p.x, targetPos.x, 0.08); 
                entities[i].p.y = lerp(entities[i].p.y, targetPos.y, 0.08);
                if (dist(entities[i].p.x, entities[i].p.y, targetPos.x, targetPos.y) < 0.5) { 
                    entities[i].p.set(targetPos); arrivedCount++; 
                }
            } else { arrivedCount++; }
        }
        if (arrivedCount === entities.length) { isResettingPositions = false; isEvacuating = false; }
    }

    let moving = false;
    for (let e of entities) { if (e.v.mag() > 0.05) moving = true; }
    
    if (moving || isResettingPositions || isEvacuating || matchWinner || isEditingTactic || isGoalCelebrating) {
        orbitAlpha = lerp(orbitAlpha, 0, 0.15); 
    } else {
        orbitAlpha = lerp(orbitAlpha, 255, 0.08); 
    }

    if (!moving && !isResettingPositions && !isEvacuating && turnSwitchedThisRoll && !matchWinner && !isEditingTactic && !isGoalCelebrating) {
        triggerSmoothEvacuation();
        turnSwitchedThisRoll = false; 
    }

    if (matchWinner) {
        animatedBgColor = color(PLAYER1_COLOR); 
    } else if (isGoalCelebrating && goalScoringTeamColor) {
        let targetGoalBg = (goalScoringTeamColor === PLAYER1_COLOR) ? color('#3a1515') : color('#15363a');
        animatedBgColor = lerpColor(animatedBgColor, targetGoalBg, 0.15);
    } else if (isEditingTactic) {
        animatedBgColor = color('#1e2528'); 
    } else if (moving || isResettingPositions || isEvacuating) {
        animatedBgColor = lerpColor(animatedBgColor, color(ORIGINAL_BG), 0.04);
    } else {
        let turnBg = (currentTurn === PLAYER1_COLOR) ? color(BG_P1) : color(BG_P2);
        animatedBgColor = lerpColor(animatedBgColor, turnBg, 0.04);
    }
    
    background(animatedBgColor);

    if (!matchWinner && !isGoalCelebrating) {

function handleMatchEnd(winnerName) {
    ballTrail = []; isEditingTactic = false; matchWinner = null; isGoalCelebrating = false;
    fieldScale = 1.0; targetFieldScale = 1.0; globalSpawnAlpha = 255; goalW = defaultGoalW;   
    
    if (isCampaign) {
        if (p1Goals > p2Goals) { 
            currentLevel++; if (currentLevel >= CAMPAIGN_LEVELS.length) { gameState = 'MENU'; isCampaign = false; currentLevel = 0; entities = []; } 
            else { startCampaignLevel(currentLevel); }
        } else { startCampaignLevel(currentLevel); }
    } 
    else if (isTournament) {
        let currentRound = tourRounds[currentRoundIdx];
        let match = currentRound[currentMatchIdx];
        match.played = true;
        match.score1 = p1Goals;
        match.score2 = p2Goals;

        let winnerTeam = (p1Goals > p2Goals) ? match.t1 : match.t2;

        currentMatchIdx++;
        if (currentMatchIdx >= currentRound.length) {
            if (currentRound.length === 1) {
                alert(`ЧЕМПИОНАТ ЗАВЕРШЕН!\nПобедитель гран-при: ${winnerTeam.name}!`);
                isTournament = false;
                gameState = 'MENU';
                entities = [];
            } else {
                let nextRoundMatches = [];
                for (let i = 0; i < currentRound.length; i += 2) {
                    let w1 = (currentRound[i].score1 > currentRound[i].score2) ? currentRound[i].t1 : currentRound[i].t2;
                    let w2 = (currentRound[i+1].score1 > currentRound[i+1].score2) ? currentRound[i+1].t1 : currentRound[i+1].t2;
                    nextRoundMatches.push({ t1: w1, t2: w2, score1: 0, score2: 0, played: false });
                }
                tourRounds.push(nextRoundMatches);
                currentRoundIdx++;
                currentMatchIdx = 0;

            }
        } else {
            gameState = 'TOUR_BRACKET';
        }
    }

function executeBotTurn() {
    let botChips = []; let ball = null;
    for (let e of entities) { if (e.isBall) ball = e; else if (e.color === PLAYER2_COLOR) botChips.push(e); }
    if (!ball || botChips.length === 0) return;
    let chosenChip = botChips[0]; let targetGate = createVector(fieldX + fieldW/2, fieldY + fieldH); 

    if (botDifficulty === 'ЛЕГКО') {
        chosenChip = random(botChips); let pushVec = p5.Vector.sub(ball.p, chosenChip.p);
        pushVec.add(p5.Vector.random2D().mult(random(30, 80))); pushVec.normalize().mult(random(6, 12)); chosenChip.v.set(pushVec);
    } 
    else if (botDifficulty === 'СРЕДНЕ') {
        let minDist = 9999;
        for (let c of botChips) { let d = dist(c.p.x, c.p.y, ball.p.x, ball.p.y); if (d < minDist) { minDist = d; chosenChip = c; } }
        let pushVec = p5.Vector.sub(ball.p, chosenChip.p); pushVec.add(p5.Vector.random2D().mult(random(5, 18))); pushVec.normalize().mult(14); chosenChip.v.set(pushVec);
    } 
    else if (botDifficulty === 'СЛОЖНО') {
        let bestScore = -9999;
        for (let c of botChips) {
            let toBall = p5.Vector.sub(ball.p, c.p); let toGate = p5.Vector.sub(targetGate, ball.p);
            let alignment = toBall.normalize().dot(toGate.normalize()); if (alignment > bestScore) { bestScore = alignment; chosenChip = c; }
        }
        let pushVec = p5.Vector.sub(ball.p, chosenChip.p); pushVec.normalize().mult(17); chosenChip.v.set(pushVec);
    }
    // ИСПРАВЛЕНИЕ: Убран playSound('hit'), бот запускает фишку молча
    currentTurn = PLAYER1_COLOR; turnSwitchedThisRoll = true; 
}

function triggerSmoothEvacuation() {
    let penaltyH = fieldH * 0.11; let goalLeftX = (fieldX + fieldW/2) - goalW/2; let goalRightX = (fieldX + fieldW/2) + goalW/2;
    targetPositions = []; let needsEvac = false;
    for (let i = 0; i < entities.length; i++) {
        let e = entities[i]; targetPositions.push(e.p.copy());
        if (!e.isBall) {
            let r = e.d / 2;
            if (e.p.x > goalLeftX - 2 && e.p.x < goalRightX + 2) {
                if (e.p.y < fieldY + 2) {
                    let flankX = (e.p.x < fieldX + fieldW/2) ? (fieldX + fieldW/2 - goalW*0.65) : (fieldX + fieldW/2 + goalW*0.65);
                    targetPositions[i].set(flankX, fieldY + penaltyH + r + 6); e.v.set(0, 0); needsEvac = true;
                }
                if (e.p.y > fieldY + fieldH - 2) {
                    let flankX = (e.p.x < fieldX + fieldW/2) ? (fieldX + fieldW/2 - goalW*0.65) : (fieldX + fieldW/2 + goalW*0.65);
                    targetPositions[i].set(flankX, fieldY + fieldH - penaltyH - r - 6); e.v.set(0, 0); needsEvac = true;
                }
            }
        }
    }
    if (needsEvac) isEvacuating = true;
}

    else if (gameState === 'DIFFICULTY_SELECT') {

        if (mouseX > medBtn.x && mouseX < medBtn.x + medBtn.w && mouseY > medBtn.y && mouseY < medBtn.y + medBtn.h) { playSound('click'); botDifficulty = 'СРЕДНЕ'; startGameMatch(); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (mouseX > hardBtn.x && mouseX < hardBtn.x + hardBtn.w && mouseY > hardBtn.y && mouseY < hardBtn.y + hardBtn.h) { playSound('click'); botDifficulty = 'СЛОЖНО'; startGameMatch(); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (mouseX > backBtn.x && mouseX < backBtn.x + backBtn.w && mouseY > backBtn.y && mouseY < backBtn.y + backBtn.h) { playSound('click'); gameState = 'MODE_SELECT'; lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
    }
    else if (gameState === 'SETTINGS_PANEL') {
        if (mouseX > soundToggleBtn.x && mouseX < soundToggleBtn.x + soundToggleBtn.w && mouseY > soundToggleBtn.y && mouseY < soundToggleBtn.y + soundToggleBtn.h) { soundEnabled = !soundEnabled; playSound('click'); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (mouseX > vibroToggleBtn.x && mouseX < vibroToggleBtn.x + vibroToggleBtn.w && mouseY > vibroToggleBtn.y && mouseY < vibroToggleBtn.y + vibroToggleBtn.h) { vibrationEnabled = !vibrationEnabled; triggerVibrate(30); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (mouseX > sliderX - 10 && mouseX < sliderX + sliderW + 10 && mouseY > sliderY - 10 && mouseY < sliderY + sliderH + 10) { isDraggingSlider = true; }
        
        if (mouseX > p2LeftBtn.x && mouseX < p2LeftBtn.x + p2LeftBtn.w && mouseY > p2Y && mouseY < p2Y + p2LeftBtn.h) { p2TacticIdx = (p2TacticIdx - 1 + TACTICS.length) % TACTICS.length; playSound('click'); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (mouseX > p2RightBtn.x && mouseX < p2RightBtn.x + p2RightBtn.w && mouseY > p2Y && mouseY < p2Y + p2RightBtn.h) { p2TacticIdx = (p2TacticIdx + 1) % TACTICS.length; playSound('click'); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (TACTICS[p2TacticIdx] === 'СВОЯ' && mouseX > p2SetupBtn.x && mouseX < p2SetupBtn.x + p2SetupBtn.w && mouseY > p2SetupBtn.y && mouseY < p2SetupBtn.y + p2SetupBtn.h) { startTacticEditing(PLAYER2_COLOR); playSound('click'); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (mouseX > p1LeftBtn.x && mouseX < p1LeftBtn.x + p1LeftBtn.w && mouseY > p1Y && mouseY < p1Y + p1LeftBtn.h) { p1TacticIdx = (p1TacticIdx - 1 + TACTICS.length) % TACTICS.length; playSound('click'); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (mouseX > p1RightBtn.x && mouseX < p1RightBtn.x + p1RightBtn.w && mouseY > p1Y && mouseY < p1Y + p1RightBtn.h) { p1TacticIdx = (p1TacticIdx + 1) % TACTICS.length; playSound('click'); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
        if (TACTICS[p1TacticIdx] === 'СВОЯ' && mouseX > p1SetupBtn.x && mouseX < p1SetupBtn.x + p1SetupBtn.w && mouseY > p1SetupBtn.y && mouseY < p1SetupBtn.y + p1SetupBtn.h) { startTacticEditing(PLAYER1_COLOR); playSound('click'); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }

        if (mouseX > backBtn.x && mouseX < backBtn.x + backBtn.w && mouseY > backBtn.y && mouseY < backBtn.y + backBtn.h) { playSound('click'); gameState = 'MENU'; lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
    }
    else if (gameState === 'GAME') {
        if (isGoalCelebrating) return false;
        if (isEditingTactic) {
            let isOverTopSave = (mouseX > saveBtnZone.x && mouseX < saveBtnZone.x + saveBtnZone.w && mouseY > saveBtnZone.y && mouseY < saveBtnZone.y + saveBtnZone.h);
            let isOverBottomSave = (mouseX > saveBtnZone.x && mouseX < saveBtnZone.x + saveBtnZone.w && mouseY > (fieldY + fieldH) && mouseY < (fieldY + fieldH + goalH));
            if ((editingTeam === PLAYER2_COLOR && isOverTopSave) || (editingTeam === PLAYER1_COLOR && isOverBottomSave)) { saveCustomTactic(); lastTouchTime = millis(); if (e) e.preventDefault(); return false; }
            
            let mousePos = createVector(mouseX, mouseY);
            for (let ent of entities) {
                if (!ent.isBall && ent.color === editingTeam) {
                    if (dist(mousePos.x, mousePos.y, ent.p.x, ent.p.y) < ent.d/2 + 20) { selectedChip = ent; break; }
                }
            }
        } else {
            if (isResettingPositions || isEvacuating || (isVsBot && currentTurn === PLAYER2_COLOR)) return false; 
            for (let ent of entities) { if (ent.v.mag() > 0.1) return false; } 
            let mousePos = createVector(mouseX, mouseY);
            for (let ent of entities) {
                if (!ent.isBall && ent.color === currentTurn) {
                    if (dist(mousePos.x, mousePos.y, ent.p.x, ent.p.y) < ent.d/2 + 25) { selectedChip = ent; break; }
                }
            }
        }
    }
    if (e) e.preventDefault();
    return false;
}

function mousePressed(e) { touchStarted(e); }

function mouseDragged() {
    if (gameState === 'GAME' && isEditingTactic && selectedChip) {
        selectedChip.p.x = constrain(mouseX, fieldX + selectedChip.d/2, fieldX + fieldW - selectedChip.d/2);
        if (editingTeam === PLAYER2_COLOR) { selectedChip.p.y = constrain(mouseY, fieldY - goalH + selectedChip.d/2, fieldY + fieldH/2 - selectedChip.d/2 - 5); } 
        else { selectedChip.p.y = constrain(mouseY, fieldY + fieldH/2 + selectedChip.d/2 + 5, fieldY + fieldH + goalH - selectedChip.d/2); }
    }
}

function mouseReleased() {
    isDraggingSlider = false;
    if (gameState === 'GAME' && isEditingTactic && selectedChip) { selectedChip = null; return; }
    if (gameState === 'GAME' && selectedChip && !matchWinner && !isGoalCelebrating) {
        let mousePos = createVector(mouseX, mouseY); let force = p5.Vector.sub(selectedChip.p, mousePos);
        if (force.mag() > 12) {
            force.limit(130); 
            let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;
            let speedBoost = (lvl && (lvl.mod === 'fast_ball' || lvl.mod === 'chaos')) ? 1.6 : 1.0;
            force.mult(STRIKE_POWER * speedBoost); selectedChip.v.add(force);
            triggerVibrate(25);
            currentTurn = (currentTurn === PLAYER1_COLOR) ? PLAYER2_COLOR : PLAYER1_COLOR;
            turnSwitchedThisRoll = true; 
        }
        selectedChip = null; 
    }
}

function startTacticEditing(team) {
    gameState = 'GAME'; isEditingTactic = true; editingTeam = team; entities = []; activeModifiers = [];
    let centerX = fieldX + fieldW / 2;
    entities.push(new Entity(centerX, fieldY + fieldH / 2, 18, '#fff', true)); 
    if (team === PLAYER2_COLOR) spawnTeamToPositions(PLAYER2_COLOR, 'БАЛАНС', true, null);
    else spawnTeamToPositions(PLAYER1_COLOR, 'БАЛАНС', false, null);
}

function saveCustomTactic() {
    let centerX = fieldX + fieldW / 2; let savedArr = [];
    for (let e of entities) {
        if (!e.isBall && e.color === editingTeam) {
            let offset = createVector(e.p.x - centerX, e.p.y - (fieldY + fieldH/2)); savedArr.push(offset);
        }
    }
    if (editingTeam === PLAYER2_COLOR) { p2CustomPositions = savedArr; p2Saved = true; } 
    else { p1CustomPositions = savedArr; p1Saved = true; }
    triggerVibrate(50); playSound('click'); isEditingTactic = false; editingTeam = null; gameState = 'SETTINGS_PANEL';
}

function drawSaveButtonsOverlay() {
    push(); textAlign(CENTER, CENTER); textStyle(BOLD); textSize(13);
    let mouseOverTop = (mouseX > saveBtnZone.x && mouseX < saveBtnZone.x + saveBtnZone.w && mouseY > saveBtnZone.y && mouseY < saveBtnZone.y + saveBtnZone.h);
    let mouseOverBottom = (mouseX > saveBtnZone.x && mouseX < saveBtnZone.x + saveBtnZone.w && mouseY > (fieldY + fieldH) && mouseY < (fieldY + fieldH + goalH));

    if (editingTeam === PLAYER2_COLOR) {
        fill(mouseOverTop ? '#388e3c' : '#2e7d32'); rect(saveBtnZone.x, saveBtnZone.y, saveBtnZone.w, saveBtnZone.h, 4); fill(255); text("СОХРАНИТЬ", saveBtnZone.x + saveBtnZone.w/2, saveBtnZone.y + saveBtnZone.h/2);
    } else { fill(30); rect(saveBtnZone.x, saveBtnZone.y, saveBtnZone.w, saveBtnZone.h, 4); fill(80); text("РЕДАКТОР СИНИХ", saveBtnZone.x + saveBtnZone.w/2, saveBtnZone.y + saveBtnZone.h/2); }

    if (editingTeam === PLAYER1_COLOR) {
        fill(mouseOverBottom ? '#388e3c' : '#2e7d32'); rect(saveBtnZone.x, fieldY + fieldH, saveBtnZone.w, goalH, 4); fill(255); text("СОХРАНИТЬ", saveBtnZone.x + saveBtnZone.w/2, fieldY + fieldH + goalH/2);
    } else { fill(30); rect(saveBtnZone.x, fieldY + fieldH, saveBtnZone.w, goalH, 4); fill(80); text("РЕДАКТОР КРАСНЫХ", saveBtnZone.x + saveBtnZone.w/2, fieldY + fieldH + goalH/2); }
    pop();
}

function startGameMatch() {
    p1Goals = 0; p2Goals = 0; isResettingPositions = false; isEvacuating = false; matchWinner = null; ballTrail = []; fieldScale = 1.0; targetFieldScale = 1.0; globalSpawnAlpha = 255; isEditingTactic = false; isGoalCelebrating = false;
    activeModifiers = []; goalW = defaultGoalW;
    if(isVsBot && TACTICS[p2TacticIdx] !== 'СВОЯ') p2TacticIdx = floor(random(0, 4)); 
    resetFieldDirect(PLAYER1_COLOR); gameState = 'GAME';
}

function resetFieldDirect(nextTurn) {
    entities = []; particles = []; ballTrail = []; lastTouchColor = null; currentTurn = nextTurn; turnSwitchedThisRoll = false;
    let centerX = fieldX + fieldW / 2;
    entities.push(new Entity(centerX, fieldY + fieldH / 2, 18, '#fff', true)); 
    spawnTeamToPositions(PLAYER2_COLOR, TACTICS[p2TacticIdx], true, null);
    spawnTeamToPositions(PLAYER1_COLOR, TACTICS[p1TacticIdx], false, null);
}

function animateFieldToTactic(nextTurn) {
    isResettingPositions = true; isEvacuating = false; lastTouchColor = null; currentTurn = nextTurn; turnSwitchedThisRoll = false; targetPositions = []; ballTrail = [];
    let centerX = fieldX + fieldW / 2;
    targetPositions.push(createVector(centerX, fieldY + fieldH / 2)); 
    for(let e of entities) e.v.set(0,0); 
    spawnTeamToPositions(PLAYER2_COLOR, TACTICS[p2TacticIdx], true, targetPositions);
    spawnTeamToPositions(PLAYER1_COLOR, TACTICS[p1TacticIdx], false, targetPositions);
    globalSpawnAlpha = 0; 
}

function spawnTeamToPositions(teamColor, tacticName, isTop, arrayToPush) {
    let centerX = fieldX + fieldW / 2; let chipD = 35; let tempPositions = [];
    if (tacticName === 'СВОЯ') {
        let savedPositions = isTop ? p2CustomPositions : p1CustomPositions;
        if (savedPositions.length === 0) tacticName = 'БАЛАНС';
        else { for (let offset of savedPositions) { tempPositions.push(createVector(centerX + offset.x, (fieldY + fieldH/2) + offset.y)); } }
    }

    if (tacticName === 'РАНДОМ') {
        let spawned = 0; let minY = isTop ? (fieldY + chipD) : (fieldY + fieldH * 0.53); let maxY = isTop ? (fieldY + fieldH * 0.47) : (fieldY + fieldH - chipD);
        while(spawned < 5) {
            let rx = random(fieldX + chipD, fieldX + fieldW - chipD); let ry = random(minY, maxY); let tooClose = false;
            for(let p of tempPositions) { if(dist(rx, ry, p.x, p.y) < chipD + 10) tooClose = true; }
            if(!tooClose) { tempPositions.push(createVector(rx, ry)); spawned++; }
        }
    } else if (tacticName !== 'СВОЯ') {
        if (isTop) {
            if (tacticName === 'БАЛАНС') {
                tempPositions.push(createVector(centerX, fieldY + 65)); tempPositions.push(createVector(centerX - 45, fieldY + 85)); tempPositions.push(createVector(centerX + 45, fieldY + 85)); tempPositions.push(createVector(centerX - 80, fieldY + fieldH * 0.35)); tempPositions.push(createVector(centerX + 80, fieldY + fieldH * 0.35));
            } else if (tacticName === 'АТАКА') {
                tempPositions.push(createVector(centerX, fieldY + 55)); tempPositions.push(createVector(centerX, fieldY + fieldH * 0.22)); tempPositions.push(createVector(centerX, fieldY + fieldH * 0.38)); tempPositions.push(createVector(centerX - 85, fieldY + fieldH * 0.38)); tempPositions.push(createVector(centerX + 85, fieldY + fieldH * 0.38));
            } else if (tacticName === 'ЗАЩИТА') {
                tempPositions.push(createVector(centerX, fieldY + 55)); tempPositions.push(createVector(centerX - 60, fieldY + 60)); tempPositions.push(createVector(centerX + 60, fieldY + 60)); tempPositions.push(createVector(centerX, fieldY + fieldH * 0.22)); tempPositions.push(createVector(centerX, fieldY + fieldH * 0.38));
            }
        } else {
            if (tacticName === 'БАЛАНС') {
                tempPositions.push(createVector(centerX, fieldY + fieldH - 65)); tempPositions.push(createVector(centerX - 45, fieldY + fieldH - 85)); tempPositions.push(createVector(centerX + 45, fieldY + fieldH - 85)); tempPositions.push(createVector(centerX - 80, fieldY + fieldH - fieldH * 0.35)); tempPositions.push(createVector(centerX + 80, fieldY + fieldH - fieldH * 0.35));
            } else if (tacticName === 'АТАКА') {
                tempPositions.push(createVector(centerX, fieldY + fieldH - 55)); tempPositions.push(createVector(centerX, fieldY + fieldH - fieldH * 0.22)); tempPositions.push(createVector(centerX, fieldY + fieldH - fieldH * 0.38)); tempPositions.push(createVector(centerX - 85, fieldY + fieldH - fieldH * 0.38)); tempPositions.push(createVector(centerX + 85, fieldY + fieldH - fieldH * 0.38));
            } else if (tacticName === 'ЗАЩИТА') {
                tempPositions.push(createVector(centerX, fieldY + fieldH - 55)); tempPositions.push(createVector(centerX - 60, fieldY + fieldH - 60)); tempPositions.push(createVector(centerX + 60, fieldY + fieldH - 60)); tempPositions.push(createVector(centerX, fieldY + fieldH - fieldH * 0.22)); tempPositions.push(createVector(centerX, fieldY + fieldH - fieldH * 0.38));
            }
        }
    }
    if (arrayToPush) { for(let pos of tempPositions) arrayToPush.push(pos); } 
    else { for(let pos of tempPositions) entities.push(new Entity(pos.x, pos.y, chipD, teamColor, false)); }
}

function checkCollisions() {
    for (let i = 0; i < entities.length; i++) {
        for (let j = i + 1; j < entities.length; j++) {
            let e1 = entities[i]; e2 = entities[j];
            let dx = e2.p.x - e1.p.x; let dy = e2.p.y - e1.p.y;
            let distSq = dx * dx + dy * dy; let minDist = (e1.d + e2.d) / 2;
            if (distSq < minDist * minDist) {
                let d = sqrt(distSq); let normalX = dx / d; let normalY = dy / d; let overlap = minDist - d;
                e1.p.x -= normalX * (overlap / 2); e1.p.y -= normalY * (overlap / 2);
                e2.p.x += normalX * (overlap / 2); e2.p.y += normalY * (overlap / 2);
                let vx = e2.v.x - e1.v.x; let vy = e2.v.y - e1.v.y; let vNormal = vx * normalX + vy * normalY;
                if (vNormal < 0) {
                    let totalMass = e1.mass + e2.mass; let impulse = (1.8 * vNormal) / totalMass; let strikeIntensity = abs(vNormal);
                    e1.v.x += impulse * e2.mass * normalX; e1.v.y += impulse * e2.mass * normalY;
                    e2.v.x -= impulse * e1.mass * normalX; e2.v.y -= impulse * e1.mass * normalY;
                    if (e1.isBall && !e2.isBall) lastTouchColor = e2.color;
                    if (e2.isBall && !e1.isBall) lastTouchColor = e1.color;
                    if (strikeIntensity > 2) { triggerVibrate(20); playSound('hit', strikeIntensity / 7); }
                    let sparkColor = e1.v.magSq() > e2.v.magSq() ? e1.color : e2.color;
                    if (strikeIntensity > 1.5) createSparks((e1.p.x + e2.p.x)/2, (e1.p.y + e2.p.y)/2, sparkColor, strikeIntensity);
                }
            }
        }
    }
}

function drawOriginalPull(chipPos) {
    let mousePos = createVector(mouseX, mouseY); let pullVec = p5.Vector.sub(mousePos, chipPos); let d = pullVec.mag();
    if (d > 8) {
        let maxPull = 130; let currentPull = min(d, maxPull); let angle = pullVec.heading();
        push(); translate(chipPos.x, chipPos.y); rotate(angle);
        let currentAlpha = map(aimAlpha, 0, 50, 0, 110); fill(0, currentAlpha); noStroke(); ellipse(0, 0, selectedChip ? selectedChip.d * 3.8 : 130);
        stroke(255, map(aimAlpha, 0, 50, 0, 140)); strokeWeight(5); line(0, 0, currentPull, 0);
        fill(255, map(aimAlpha, 0, 50, 0, 200)); noStroke(); ellipse(currentPull, 0, 8, 8);
        let shootDist = map(currentPull, 0, maxPull, 30, 240); let baseAlpha = map(aimAlpha, 0, 50, 0, 160);
        let steps = 14;
        for (let i = 0; i < steps; i++) {
            let t1 = i / steps; let t2 = (i + 1) / steps;
            let x1 = -t1 * shootDist; let x2 = -t2 * shootDist;
            let w1 = map(t1, 0, 1, 12, 1); let w2 = map(t2, 0, 1, 12, 1);
            let a1 = map(t1, 0, 1, baseAlpha, 0); let a2 = map(t2, 0, 1, baseAlpha, 0);
            noStroke(); beginShape(); fill(color(255, a1)); vertex(x1, -w1 / 2); fill(color(255, a2)); vertex(x2, -w2 / 2); fill(color(255, a2)); vertex(x2, w2 / 2); fill(color(255, a1)); vertex(x1, w1 / 2); endShape(CLOSE);
        }
        pop();
    }
}

function drawVisualLayout() {
    if (!fieldW) return; 
    push(); noStroke(); let stripes = 9; let sh = fieldH / stripes;
    let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;

    let topGoalW = goalW; let botGoalW = goalW;
    if (lvl && (lvl.mod === 'gate_shift' || lvl.mod === 'chaos')) { topGoalW = goalW * lvl.bScale; botGoalW = goalW * lvl.pScale; }

    fill('#225e25'); 
    rect(fieldX + fieldW/2 - topGoalW/2, fieldY - goalH, topGoalW, goalH); 
    rect(fieldX + fieldW/2 - botGoalW/2, fieldY + fieldH, botGoalW, goalH);
    
    for(let i=0; i<stripes; i++) { fill(i % 2 === 0 ? FIELD_COLOR_1 : FIELD_COLOR_2); rect(fieldX, fieldY + i*sh, fieldW, sh); }
    
    stroke(BORDER_COLOR); strokeWeight(boundarySize); noFill();
    let penaltyW = goalW * 1.35; let penaltyH = fieldH * 0.11;
    rect(fieldX + fieldW/2 - penaltyW/2, fieldY, penaltyW, penaltyH); 
    rect(fieldX + fieldW/2 - penaltyW/2, fieldY + fieldH - penaltyH, penaltyW, penaltyH);
    
    let arcSize = fieldW * 0.22;
    arc(fieldX + fieldW/2, fieldY + penaltyH, arcSize, arcSize, 0, PI);
    arc(fieldX + fieldW/2, fieldY + fieldH - penaltyH, arcSize, arcSize, PI, TWO_PI);
    
    line(fieldX, fieldY + fieldH/2, fieldX + fieldW, fieldY + fieldH/2); 
    ellipse(fieldX + fieldW/2, fieldY + fieldH/2, 85); 
    
    rect(fieldX + fieldW/2 - topGoalW/2, fieldY - goalH, topGoalW, goalH); 
    rect(fieldX + fieldW/2 - botGoalW/2, fieldY + fieldH, botGoalW, goalH); 
    rect(fieldX, fieldY, fieldW, fieldH); 
    
    fill(255); noStroke();
    ellipse(fieldX + fieldW/2 - topGoalW/2, fieldY, 5); ellipse(fieldX + fieldW/2 + topGoalW/2, fieldY, 5); 
    ellipse(fieldX + fieldW/2 - botGoalW/2, fieldY + fieldH, 5); ellipse(fieldX + fieldW/2 + botGoalW/2, fieldY + fieldH, 5);
    pop();
}

function drawFieldScore() {
    push(); let goalLeftX = fieldX + fieldW/2 - goalW/2; let earWidth = goalLeftX - fieldX; let leftEarCenterX = fieldX + earWidth / 2; let rightEarCenterX = (fieldX + fieldW) - earWidth / 2; let ballSize = 12; let spacing = 16;
    let topY = fieldY - goalH + 15;
    for (let i = 0; i < maxGoalsToWin; i++) {
        fill(i < p2Goals ? PLAYER2_COLOR : '#444444'); noStroke(); ellipse(leftEarCenterX + (i - (maxGoalsToWin-1)/2) * spacing, topY, ballSize);
        fill(i < p1Goals ? PLAYER1_COLOR : '#444444'); ellipse(rightEarCenterX + (i - (maxGoalsToWin-1)/2) * spacing, topY, ballSize);
    }
    let bottomY = fieldY + fieldH + goalH - 15;
    for (let i = 0; i < maxGoalsToWin; i++) {
        fill(i < p1Goals ? PLAYER1_COLOR : '#444444'); noStroke(); ellipse(leftEarCenterX + (i - (maxGoalsToWin-1)/2) * spacing, bottomY, ballSize);
        fill(i < p2Goals ? PLAYER2_COLOR : '#444444'); ellipse(rightEarCenterX + (i - (maxGoalsToWin-1)/2) * spacing, bottomY, ballSize);
    }
    pop();
}

function drawGoalOverlay() {
    push(); textAlign(CENTER, CENTER); textFont('Arial, sans-serif'); textStyle(BOLD);
    let alpha = map(goalTextTimer, 0, 120, 0, 255);
    textSize(54); fill(255, alpha); stroke(0, map(goalTextTimer, 0, 120, 0, 180)); strokeWeight(8); text(goalOverlayText, width / 2, height * 0.45);
    pop();
}

function drawWinOverlay() {
    push(); textAlign(CENTER, CENTER); textFont('Arial, sans-serif'); textStyle(BOLD);
    textSize(40); fill(255); stroke(0); strokeWeight(8);
    let winText = `ПОБЕДА:\n${matchWinner}!`;
    if(isCampaign) winText = (p1Goals > p2Goals) ? "УРОВЕНЬ ПРОЙДЕН!" : "ВЫ ПРОИГРАЛИ!";
    text(winText, width / 2, height * 0.43);
    pop();
}
// Этот код принудительно убирает лишние отступы при запуске на телефоне
window.addEventListener('load', () => {
    setTimeout(() => {
        window.scrollTo(0, 1);
        if (typeof windowResized === 'function') {
            windowResized();
        }
    }, 300);
});

function windowResized() {
    if (windowWidth > windowHeight) {
        return; 
    }
    resizeCanvas(windowWidth, windowHeight); 
    calculateFieldMetrics(); 
}
</script>
